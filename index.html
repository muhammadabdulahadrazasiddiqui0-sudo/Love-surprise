<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open This ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

#box {
  width: 160px;
  height: 160px;
  background: #ff4d6d;
  color: white;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 20px;
  cursor: pointer;
}

#question {
  display: none;
  text-align: center;
}

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#yes {
  background: #28a745;
  color: white;
}

#no {
  background: #dc3545;
  color: white;
  position: absolute;
}
</style>
</head>
<body>

<div id="box" onclick="openBox()">Open ❤️</div>

<div id="question">
  <h2>Will you be mine forever? 🥺</h2>
  <button id="yes" onclick="goLove()">Yes</button>
  <button id="no">No</button>
</div>

<script>
function openBox() {
  document.getElementById("box").style.display = "none";
  document.getElementById("question").style.display = "block";
}

function goLove() {
  window.location.href = "love.html";
}

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
});
</script>

</body>
</html>
